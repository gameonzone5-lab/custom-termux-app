name: AutoKaaj Cloud Hacker
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Hacking Tools
        run: |
          sudo apt update
          sudo apt install -y wget zipalign apksigner
          wget https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget https://f-droid.org/repo/com.termux_118.apk -O termux.apk
          
      - name: Unpack Original App
        run: java -jar apktool.jar d termux.apk -o AutoKaaj_Hack -f
        
      - name: Safe Inject AutoKaaj Branding
        run: |
          # একদম নিখুঁতভাবে শুধু ডিসপ্লের লেখাগুলো বদলানো হচ্ছে, কোড ভাঙবে না
          find AutoKaaj_Hack/res -type f -name "strings.xml" -exec sed -i 's/>Termux/>AutoKaaj/g' {} +
          find AutoKaaj_Hack/res -type f -name "strings.xml" -exec sed -i 's/>termux/>autoKaaj/g' {} +
          find AutoKaaj_Hack/res -type f -name "strings.xml" -exec sed -i 's/Termux was unable/AutoKaaj was unable/g' {} +
          find AutoKaaj_Hack/res -type f -name "strings.xml" -exec sed -i 's/bootstrap packages/AutoKaaj packages/g' {} +
          
      - name: Repack App
        run: java -jar apktool.jar b AutoKaaj_Hack -o AutoKaaj_Unsigned.apk
        
      - name: Optimize App
        run: zipalign -p -f 4 AutoKaaj_Unsigned.apk AutoKaaj_Aligned.apk
        
      - name: Create Digital Signature
        run: |
          keytool -genkey -v -keystore autokaaj.keystore -alias autokaaj -keyalg RSA -keysize 2048 -validity 10000 -storepass autokaaj -keypass autokaaj -dname "CN=Chiranjit Majumdar, OU=AI Automation, O=RO Service Kolkata, L=Habra II, ST=West Bengal, C=IN"
          apksigner sign --ks autokaaj.keystore --ks-pass pass:autokaaj AutoKaaj_Aligned.apk
          
      - name: Upload Final AutoKaaj App
        uses: actions/upload-artifact@v4
        with:
          name: AutoKaaj_Official_Hack
          path: AutoKaaj_Aligned.apk
