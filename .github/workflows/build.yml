name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download Bootstraps
        run: ./gradlew downloadBootstraps
      - name: Inject AutoKaaj Branding
        run: |
          mkdir -p etc
          # ১. নতুন MOTD (Welcome Message) তৈরি করা
          echo -e "\e[1;36m======================================\n      WELCOME TO AUTOKAAJ TERMINAL      \n======================================\e[0m\n\n\e[1;33m► Subscribe: AutoKaaj YouTube Channel\n► Powered by AI & Automation\e[0m\n" > etc/motd
          
          # ২. টার্মিনালের প্রম্পট (PS1) এ AutoKaaj লেখা বসানো
          unzip -p app/src/main/cpp/bootstrap-aarch64.zip etc/bash.bashrc > etc/bash.bashrc
          cat << 'EOF_PROMPT' >> etc/bash.bashrc
          PS1='\[\e[1;32m\]AutoKaaj\[\e[0m\] \[\e[1;34m\]\w\[\e[0m\] \$ '
          EOF_PROMPT
          
          # ৩. বুটস্ট্র্যাপ ফাইলগুলোর ভেতরে এই পরিবর্তনগুলো সেভ করে দেওয়া
          for z in app/src/main/cpp/bootstrap-*.zip; do zip -u "$z" etc/motd etc/bash.bashrc; done
      - name: Build with Gradle
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/debug/
