name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download Bootstraps
        run: ./gradlew downloadBootstraps
      - name: Inject AutoKaaj Custom Buttons and Branding
        run: |
          mkdir -p usr/etc usr/bin
          
          # ১. টার্মাক্সের নাম পুরোপুরি মুছে AutoKaaj ওয়েলকাম মেসেজ দেওয়া
          echo -e "\e[1;36m======================================\n      WELCOME TO AUTOKAAJ AI TERMINAL      \n======================================\e[0m\n\n\e[1;33m► 1-Click AI Agents: Use the custom buttons below!\n► Subscribe: AutoKaaj YouTube Channel\e[0m\n" > usr/etc/motd
          
          # ২. অরিজিনাল bashrc বের করে তাতে কাস্টম বোতামের সেটিং ঢোকানো
          unzip -p app/src/main/cpp/bootstrap-aarch64.zip usr/etc/bash.bashrc > usr/etc/bash.bashrc
          cat << 'EOF_BASH' >> usr/etc/bash.bashrc

          # AutoKaaj প্রম্পট
          PS1='\[\e[1;32m\]AutoKaaj\[\e[0m\] \[\e[1;34m\]\w\[\e[0m\] \$ '

          # প্রথমবার অ্যাপ ওপেন করলে স্বয়ংক্রিয়ভাবে কাস্টম বোতাম তৈরি হবে
          if [ ! -f ~/.termux/termux.properties ]; then
              mkdir -p ~/.termux
              cat << 'EOF_PROP' > ~/.termux/termux.properties
          extra-keys = [ \
            [ \
              {macro: "clear && echo 'Installing OpenManus...' && apt update && apt install python git -y && git clone https://github.com/mannaandpoem/OpenManus.git && cd OpenManus && pip install -r requirements.txt\n", display: "OpenManus"}, \
              {macro: "clear && echo 'Installing OpenClaw...' && apt update && apt install nodejs -y && npm install -g openclaw\n", display: "OpenClaw"}, \
              {macro: "clear && echo 'Preparing PicoClaw...' && apt update && apt install python git -y && echo 'PicoClaw Environment Ready!'\n", display: "PicoClaw"} \
            ], \
            [ \
              {macro: "clear && echo 'Setting up Ollama Server...' && apt install proot-distro -y && proot-distro install ubuntu && echo 'Ollama Ready!'\n", display: "Ollama Server"}, \
              {macro: "clear && echo 'Initializing Hermes Agent...' && echo 'Hermes Environment Ready!'\n", display: "Hermes Agent"}, \
              {macro: "clear && echo 'Installing Cloud Code...' && apt update && apt install nodejs -y && npm install -g @anthropic-ai/claude-code\n", display: "Cloud Code"} \
            ], \
            [ \
              {macro: "clear && echo 'Starting Codex Environment...'\n", display: "Codex"}, \
              {macro: "clear && echo 'AutoKaaj AI Workspace Initialized!'\n", display: "AI Workspace"}, \
              'ESC', 'CTRL', 'ENTER' \
            ] \
          ]
          EOF_PROP
              termux-reload-settings
          fi
          EOF_BASH

          # ৩. পরিবর্তনগুলো বুটস্ট্র্যাপ জিপের ভেতরে সেভ করা
          for z in app/src/main/cpp/bootstrap-*.zip; do 
            zip -u "$z" usr/etc/motd usr/etc/bash.bashrc
          done
      - name: Build with Gradle
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/debug/
