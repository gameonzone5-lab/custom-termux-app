name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download Bootstraps
        run: ./gradlew downloadBootstraps
      - name: Inject AutoKaaj AI Features
        run: |
          mkdir -p etc usr/bin
          
          # ১. MOTD এবং প্রম্পট ঠিক রাখা
          echo -e "\e[1;36m======================================\n      WELCOME TO AUTOKAAJ TERMINAL      \n======================================\e[0m\n\n\e[1;33m► Type 'autokaaj-ai' to install AI Agents\n► Subscribe: AutoKaaj YouTube Channel\e[0m\n" > etc/motd
          unzip -p app/src/main/cpp/bootstrap-aarch64.zip etc/bash.bashrc > etc/bash.bashrc
          echo "PS1='\[\e[1;32m\]AutoKaaj\[\e[0m\] \[\e[1;34m\]\w\[\e[0m\] \$ '" >> etc/bash.bashrc
          
          # ২. AutoKaaj AI অটো-ইন্সটলার তৈরি করা
          cat << 'EOF_SCRIPT' > usr/bin/autokaaj-ai
          #!/data/data/com.termux/files/usr/bin/bash
          echo -e "\e[1;32mStarting AutoKaaj AI Auto-Setup...\e[0m"
          echo -e "\e[1;33m1. Installing Python, Git & Dependencies...\e[0m"
          apt update && apt install python git wget curl proot-distro -y
          
          echo -e "\e[1;33m2. Preparing Environment for OpenManus & OpenClaw...\e[0m"
          pip install --upgrade pip
          
          echo -e "\e[1;33m3. Setting up Local Linux for Ollama...\e[0m"
          # (ভবিষ্যতে আপনি এখানে ওলামা এবং হারমেসের ফুল কমান্ড বসাতে পারবেন)
          
          echo -e "\e[1;36m======================================\e[0m"
          echo -e "\e[1;32m✔ AI Environment Successfully Prepared!\e[0m"
          echo -e "\e[1;36m======================================\e[0m"
          EOF_SCRIPT
          
          # স্ক্রিপ্টটিকে রান করার পারমিশন দেওয়া
          chmod +x usr/bin/autokaaj-ai
          
          # ৩. বুটস্ট্র্যাপের ভেতরে সেভ করা
          for z in app/src/main/cpp/bootstrap-*.zip; do 
            zip -u "$z" etc/motd etc/bash.bashrc usr/bin/autokaaj-ai
          done
      - name: Build with Gradle
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/debug/
