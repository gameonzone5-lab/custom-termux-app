name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execution rights
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Remove Termux Name from APK Files
        run: |
          find app/build/outputs/apk/debug/ -name "*.apk" -exec bash -c 'mv "$0" "${0/termux-app/AutoKaaj-App}"' {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AutoKaaj-Apps
          path: app/build/outputs/apk/debug/*.apk
